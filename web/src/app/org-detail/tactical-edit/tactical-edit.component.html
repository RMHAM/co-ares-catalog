<table>
  <tr *ngFor="let tac of _tacticalCallsigns">
    <td>
      <mat-form-field>
        <mat-label>Title</mat-label>
        <input matInput [value]="tac.title ?? ''" />
      </mat-form-field>
    </td>
    <td>
      <mat-form-field>
        <mat-label>Callsign</mat-label>
        <input matInput [value]="tac.callsign ?? ''" />
      </mat-form-field>
    </td>
  </tr>
</table>
